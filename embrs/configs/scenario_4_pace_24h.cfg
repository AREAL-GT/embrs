# Scenario 4 (Deschutes NF, OR) — PACE TUNING sweep config (24h window).
# Derived from scenario_4_pace.cfg, shortened 48h -> 24h so a single run is
# ~2-2.5h (vs ~4h25m for 48h) — fast enough for iterative tuning sweeps. The
# full 48h scenario_4_pace.cfg is reserved for final evaluation.
#   - FireCoordinator controller wired (strategy runs); the sweep harness
#     strips it per-seed for the no-suppression baseline.
#   - File + solar_source=offline (no network on compute nodes).
#   - log_folder/seed are patched per-seed by run_seed; values here are defaults.

[Simulation]
log_folder = /storage/home/hcoda1/0/rjdp3/scratch/embrs_logs/scenario_4_24h
t_step_s = 30
cell_size_m = 90
visualize = False
num_runs = 1
write_logs = True
user_path = /storage/home/hcoda1/0/rjdp3/r-jrogers8-0/rui/ra-cbba-core/applications/firefighting/fire_coordinator.py
user_class = FireCoordinator
model_spotting = True
canopy_species = 5
dbh_cm = 50
spot_ign_prob = 0.05
min_spot_dist_m = 50
spot_delay_s = 1800
seed = 42

[Weather]
input_type = File
file = /storage/home/hcoda1/0/rjdp3/r-jrogers8-0/rui/embrs_data/weather/scenario_4_more_intense.wxs
solar_source = offline
mesh_resolution = 250
start_datetime = 2025-07-22T06:00:00
end_datetime = 2025-07-23T06:00:00
init_mf = 0.06, 0.07, 0.08

[Map]
folder = /storage/home/hcoda1/0/rjdp3/r-jrogers8-0/rui/embrs_data/maps/scenario_4
