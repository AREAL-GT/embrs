# Scenario 4 (Deschutes NF, OR) — PACE smoke test.
# Adapted from scenario_4.cfg for Georgia Tech PACE (Phoenix):
#   - 48-hour run (was ~14 days) for a fast "does it work" test
#   - controller stripped (user_class/user_path blank) to test the sim core
#     + WindNinja first; add ra-cbba-core back once this passes
#   - solar_source = offline explicit (no Open-Meteo call on compute nodes)
#   - all paths absolute under PACE storage (.cfg paths are NOT ~-expanded)
#       inputs (maps, weather) -> group project storage (r-jrogers8-0)
#       logs                   -> scratch (write-heavy, auto-purged)

[Simulation]
log_folder = /storage/home/hcoda1/0/rjdp3/scratch/embrs_logs/scenario_4_smoke
t_step_s = 30
cell_size_m = 90
visualize = False
num_runs = 1
write_logs = True
user_path = /storage/home/hcoda1/0/rjdp3/r-jrogers8-0/rui/ra-cbba-core/applications/firefighting/fire_coordinator.py
user_class = FireCoordinator
model_spotting = True
canopy_species = 5
dbh_cm = 50
spot_ign_prob = 0.05
min_spot_dist_m = 50
spot_delay_s = 1800
seed = 42

[Weather]
input_type = File
file = /storage/home/hcoda1/0/rjdp3/r-jrogers8-0/rui/embrs_data/weather/scenario_4_more_intense.wxs
solar_source = offline
mesh_resolution = 250
start_datetime = 2025-07-22T06:00:00
end_datetime = 2025-07-24T06:00:00
init_mf = 0.06, 0.07, 0.08

[Map]
folder = /storage/home/hcoda1/0/rjdp3/r-jrogers8-0/rui/embrs_data/maps/scenario_4
